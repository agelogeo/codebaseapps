<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join group on Keibo</title>
  <meta name="apple-itunes-app" content="app-id=6755344228" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
    .card { border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; }
    h1 { font-size: 1.4rem; margin-top: 0; }
    .btn { display: inline-block; margin-top: 16px; padding: 12px 18px; border-radius: 10px;
      background: #ff7b00; color: #fff; text-decoration: none; font-weight: 600; }
    .muted { color: #666; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Join group on Keibo</h1>
    <p id="subtitle" class="muted">Opening the app…</p>
    <p id="code" class="muted"></p>
    <a id="openApp" class="btn" href="#">Open in Keibo</a>
    <p class="muted" style="margin-top: 20px;">
      No app yet?
      <a href="https://apps.apple.com/app/id6755344228">App Store</a>
      ·
      <a href="https://play.google.com/store/apps/details?id=com.codebaseapps.keiboapp">Google Play</a>
    </p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '';
    const groupName = params.get('groupName') || 'a group';
    const members = params.get('members');
    const joinUrl = window.location.href;

    document.getElementById('title').textContent = `Join ${decodeURIComponent(groupName)}`;
    document.getElementById('subtitle').textContent = members
      ? `${members} members already in this group`
      : 'You were invited to split expenses together';
    document.getElementById('code').textContent = code ? `Invite code: ${code}` : '';

    const openApp = document.getElementById('openApp');
    openApp.href = joinUrl;

    // If app is installed, universal/app links should intercept before this page loads.
    // Fallback: try opening the same HTTPS URL again from user tap.
  </script>
</body>
</html>
